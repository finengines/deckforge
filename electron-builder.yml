appId: com.deckforge.app
productName: DeckForge
icon: build/icon.png
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!e2e/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!vitest.config.ts'
  - '!playwright.config.ts'
asarUnpack:
  - resources/**
win:
  executableName: DeckForge
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: DeckForge needs access to your Documents folder to save and load card decks.
    - NSDownloadsFolderUsageDescription: DeckForge needs access to Downloads to export PDF files.
  notarize: false
  target:
    - dmg
    - zip
dmg:
  artifactName: DeckForge-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: github.com/finengines
  category: Graphics
appImage:
  artifactName: DeckForge-${version}.${ext}
npmRebuild: false
