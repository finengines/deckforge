<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="512" cy="512" r="480" fill="#1e1b4b"/>
  <!-- Card shape (slightly rotated) -->
  <g transform="translate(512,520) rotate(-8)">
    <rect x="-180" y="-250" width="360" height="500" rx="24" fill="url(#cardGrad)" stroke="#a78bfa" stroke-width="6"/>
    <!-- Inner border -->
    <rect x="-156" y="-226" width="312" height="452" rx="16" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  </g>
  <!-- Spark/forge symbol -->
  <g transform="translate(512,480)">
    <!-- Anvil base -->
    <path d="M-60,80 L-80,120 L80,120 L60,80 Z" fill="#64748b"/>
    <rect x="-50" y="60" width="100" height="24" rx="4" fill="#94a3b8"/>
    <!-- Spark rays -->
    <g fill="url(#sparkGrad)">
      <polygon points="0,-80 -12,-20 0,-35 12,-20"/>
      <polygon points="0,-80 -8,-25 0,-40 8,-25" transform="rotate(30)"/>
      <polygon points="0,-80 -8,-25 0,-40 8,-25" transform="rotate(-30)"/>
      <polygon points="0,-80 -6,-30 0,-45 6,-30" transform="rotate(60)"/>
      <polygon points="0,-80 -6,-30 0,-45 6,-30" transform="rotate(-60)"/>
    </g>
    <!-- Central spark glow -->
    <circle cx="0" cy="-10" r="18" fill="#fbbf24" opacity="0.9"/>
    <circle cx="0" cy="-10" r="10" fill="#fef3c7"/>
  </g>
  <!-- Small accent sparks -->
  <circle cx="380" cy="320" r="6" fill="#fbbf24" opacity="0.7"/>
  <circle cx="650" cy="380" r="4" fill="#fbbf24" opacity="0.5"/>
  <circle cx="420" cy="260" r="3" fill="#fef3c7" opacity="0.6"/>
</svg>
